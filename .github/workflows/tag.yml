name: Tag Release
on:
  push:
    branches: [ master, main ]
jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          
      - name: Get previous release tag
        id: previoustag
        uses: "WyriHaximus/github-action-get-previous-tag@v2"

      - name: Format previous release tag
        id: tagformat
        run: |
          previous_tag=$(echo ${{steps.previoustag.outputs.tag}} | cut -c2-)
          echo "::set-output name=previous_tag::$previous_tag"
          
      - name: Bump release version
        id: bump_version
        uses: christian-draeger/increment-semantic-version@1.2.3
        with:
          current-version: ${{ steps.tagformat.outputs.previous_tag }}
          version-fragment: 'bug'
        
      - name: Create Release
        if: github.event_name == 'push'
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump_version.outputs.next-version }}
          name: Release v${{ steps.bump_version.outputs.next-version }}
          draft: false
          prerelease: false
          
      - name: Install uv
        if: github.event_name == 'push'
        uses: astral-sh/setup-uv@v8.3.2

      - name: Build and deploy
        if: github.event_name == 'push'
        run: |
          echo v${{ steps.bump_version.outputs.next-version }} > VERSION
          uv build
          uv publish
        env:
          UV_PUBLISH_USERNAME: ${{ secrets.TWINE_USERNAME }}
          UV_PUBLISH_PASSWORD: ${{ secrets.TWINE_PASSWORD }}

      - name: Set up QEMU
        if: github.event_name == 'push'
        uses: docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4.4.0
        with:
          username: ansdevops
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            CERTBOT_DNS_SAFEDNS_VERSION=${{ steps.bump_version.outputs.next-version }}
          tags: |
            ansgroup/certbot-dns-safedns:v${{ steps.bump_version.outputs.next-version }}
            ansgroup/certbot-dns-safedns:latest
