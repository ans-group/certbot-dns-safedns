name: Tests
on:
  push:
    branches: [ master, main ]
  pull_request:
  workflow_call:
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set placeholder VERSION
        run: echo "0.0.0" > VERSION

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        run: uv run pytest certbot_dns_safedns/dns_safedns_test.py -v

  test-oldest-supported:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.10"

      - name: Set placeholder VERSION
        run: echo "0.0.0" > VERSION

      - name: Install oldest supported dependencies
        run: |
          uv venv
          uv pip install -r local-oldest-requirements.txt
          uv pip install --no-deps -e .
          uv pip install pytest

      - name: Run tests
        run: uv run pytest certbot_dns_safedns/dns_safedns_test.py -v
